<div class="min-vh-100 d-flex align-items-center justify-content-center bg-body">
    <div class="w-100" style="max-width: 400px; padding: 1.5rem;">

        <!-- Logo and brand. -->
        <div class="d-flex align-items-center gap-2 mb-4 justify-content-center">
            <svg width="28" height="28" viewBox="0 0 32 32" fill="none">
                <path d="M16 2L4 8v8c0 7.18 5.14 13.9 12 15.5C22.86 29.9 28 23.18 28 16V8L16 2Z" fill="#0d9488"/>
                <path d="M11 16l3.5 3.5L21 13" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            <span class="iv-brand fs-5">IntegrityVault</span>
        </div>

        <!-- Credential inputing area.-->
        <div class="card border-0 shadow-sm">
            <div class="card-body p-4">

                <h6 class="fw-semibold mb-1">Sign in</h6>
                
                <br>

                <!-- Username / Email field. -->
                <div class="mb-3">
                    <label class="form-label">Username or Email</label>
                    <input type="text" class="form-control" placeholder="username or email@hospital.com"
                        [(ngModel)]="usernameOrEmail" [class.is-invalid]="errors.usernameOrEmail" (keyup.enter)="onLogin()"
                    />
                    @if (errors.usernameOrEmail) {
                        <div class="invalid-feedback">{{ errors.usernameOrEmail }}</div>
                    }
                </div>

                <!-- Password field. -->
                <div class="mb-4">
                    <label class="form-label">Password</label>
                    <div class="input-group" [class.is-invalid]="errors.password">
                        <input [type]="showPassword ? 'text' : 'password'" class="form-control" placeholder="Your password"
                        [(ngModel)]="password" [class.is-invalid]="errors.password" (keyup.enter)="onLogin()"
                        />
                        <button class="btn btn-outline-secondary" type="button" (click)="showPassword = !showPassword">
                            <i class="bi" [ngClass]="showPassword ? 'bi-eye-slash' : 'bi-eye'"></i>
                        </button>
                    </div>
                    @if (errors.password) {
                        <div class="text-danger small mt-1">{{ errors.password }}</div>
                    }
                </div>

                <!-- API error. -->
                @if (errors.api) {
                    <div class="alert alert-danger py-2 small mb-3">
                        <i class="bi bi-exclamation-circle me-2"></i>{{ errors.api }}
                    </div>
                }

                <!-- Submit. -->
                <button class="btn btn-primary w-100" (click)="onLogin()" [disabled]="loading">
                    @if (loading) {
                        <span class="spinner-border spinner-border-sm me-2"></span>
                    }
                    {{ loading ? 'Signing in...' : 'Sign in' }}
                </button>

            </div>
        </div>

        <!-- Footer note. -->
        <p class="text-center text-secondary mt-3" style="font-size: 0.75rem;">
            Access is restricted to authorised personnel only.
        </p>
    </div>
</div>
