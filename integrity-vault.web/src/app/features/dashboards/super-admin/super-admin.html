<div class="d-flex" style="min-height:100vh">
  <!-- Sidebar. -->
  <app-sidebar
    [activeLink]="activeLink"
    [sidebarItems]="[
      { label: 'Hospitals', icon: 'bi bi-building', link: 'hospitals' },
      { label: 'Admins', icon: 'bi bi-person-gear', link: 'admins' },
      { label: 'Active Wallet', icon: 'bi-link-45deg', link: 'wallet' }
    ]"
    [isCollapsed]="isCollapsed"
    (closeSidebar)="toggleSidebar()"
    (linkClicked)="onNavigate($event)">
  </app-sidebar>

  <div class="iv-main">
    <!-- Topbar. -->
    <app-topbar (toggleSidebar)="toggleSidebar()" [message]="'Welcome back, Super Admin'">
    </app-topbar>

    <div class="p-4">

      <!-- ACTIVE WALLET -->
      @if (activeLink === "wallet") {
        <ng-container>
          <h5 class="mb-4 fw-semibold">Active Wallet</h5>
          <div class="card border-0 p-4" style="max-width:540px">
            <p class="text-secondary small mb-3">Sets the hospital blockchain context for the entire system.</p>
            <label class="form-label">Current Wallet Address</label>
            <div class="input-group mb-4">
              <input type="text" class="form-control font-mono" value="0x0000000000000000000000000000000000000000" readonly>
              <button class="btn btn-outline-secondary" type="button"><i class="bi bi-clipboard"></i></button>
            </div>
            <label class="form-label">Switch Hospital Wallet</label>
            <div class="input-group">
              <select class="form-select">
                <option value="" disabled selected>Select hospital...</option>
                @for (hospital of hospitals; track $index) {
                  <option [value]="hospital.walletAddress">{{ hospital.name }}</option>
                }
              </select>
              <button class="btn btn-primary">Switch</button>
            </div>
          </div>
        </ng-container>
      }

      @if(activeLink === "hospitals") {
        <ng-container>
          <app-entity-section
            title="Hopsitals"
            addLabel="Add Hopital"
            emptyIcon="bi bi-building"
            emptyMessage="No Hopsital Yet."
            [columns]="hospitalColumns"
            [rows]="hospitals"
            (addClicked)="openHospitalModal()"
            (editRow)="onEditHospital($event)"
            (deleteRow)="onDeleteHospital($event)"
          >
          </app-entity-section>
        </ng-container>
      }

      <!-- ADMINS -->
      @if (activeLink === 'admins') {
        <ng-container>
          <app-entity-section
            title="Admins"
            addLabel="Add Admin"
            emptyIcon="bi bi-person-gear"
            emptyMessage="No Admins Yet."
            [columns]="adminColumns"
            [rows]="admins"
            [addDisable]="noHospitals"
            warningMessage="Create a hospital first before adding admins."
            warningActionLabel="Create Hospital"
            (addClicked)="openAdminModal()"
            (warningAction)="onNavigate('hospitals')"
            (editRow)="onEditAdmin($event)"
            (deleteRow)="onDeleteAdmin($event)"
          >
          </app-entity-section>
        </ng-container>
      }
    </div>
  </div>
</div>

<!-- Hospital Modal -->
<app-entity-modal
  [show]="showHospitalModal"
  [title]="editingHospital ? 'Edit Hospital' : 'Add Hospital'"
  [confirmLabel]="editingHospital ? 'Save Changes' : 'Create Hospital'"
  (closed)="closeModals()"
  (confirmed)="onHospitalConfirmed()">
  <app-hospital-form
    mode="full"
    [initialValue]="hospitalInitialValue">
  </app-hospital-form>
</app-entity-modal>

<!-- Admin modal. -->
<app-entity-modal
  [show]="showAdminModal"
  [title]="editingAdmin ? 'Edit Admin' : 'Add Admin'"
  [confirmLabel]="editingAdmin ? 'Save Changes' : 'Create Admin'"
  (closed)="closeModals()"
  (confirmed)="onAdminConfirmed()">
  <app-user-form [role]="UserRole.Admin" [hospitals]="hospitals" [showHospitalSelect]="true" [initialValue]="adminInitialValue"></app-user-form>
</app-entity-modal>


<!-- Delete modal. -->
<app-confirm-modal
  [show]="showDeleteModal"
  [title]="'Delete ' + deleteTarget + '?'"
  message="This action cannot be undone."
  [buttons]="[
    { label: 'Cancel', style: ConfirmButtonStyle.Secondary, result: false },
    { label: 'Delete', style: ConfirmButtonStyle.Danger, result: true }
  ]"
  (closed)="closeModals()"
  (action)="handleDeleteResult($event)"
>
  <i icon class="bi bi-exclamation-circle text-danger d-block mb-3 iv-modal-icon"></i>
</app-confirm-modal>
