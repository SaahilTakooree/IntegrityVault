@if (show) {
    <div class="modal fade show" style="display:block" tabindex="-1" (click)="closed.emit()">
        <div class="modal-dialog modal-dialog-centered" (click)="$event.stopPropagation()">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">
                        {{ title }}
                    </h5>
                    <button class="btn-close" (click)="closed.emit()"></button>
                </div>
                <div class="modal-body">
                    <ng-content></ng-content>
                </div>
                <div class="modal-footer">
                    <button class="btn btn-outline-secondary" (click)="closed.emit()">
                        Cancel
                    </button>
                    <button class="btn btn-primary" (click)="confirmed.emit()">
                        {{ confirmLabel}}
                    </button>
                </div>
            </div>
        </div>
    </div>
    <div class="modal-backdrop fade show" (click)="closed.emit()"></div>
}
