<div class="row g-3">
  <div class="col-12">
    <label class="form-label">Username <span class="text-danger">*</span></label>
    <input type="text" class="form-control" placeholder="e.g. jdoe">
  </div>
  <div class="col-md-6">
    <label class="form-label">Email <span class="text-danger">*</span></label>
    <input type="email" class="form-control" placeholder="user@hospital.com">
  </div>
  <div class="col-md-6">
    <label class="form-label">Password <span class="text-danger">*</span></label>
    <div class="input-group">
      <input [type]="showPassword ? 'text' : 'password'" class="form-control" placeholder="Min. 8 characters">
      <button class="btn btn-outline-secondary" type="button" (click)="showPassword=!showPassword">
        <i class="bi" [ngClass]="showPassword ? 'bi-eye-slash' : 'bi-eye'"></i>
      </button>
    </div>
  </div>
  <div class="col-12" *ngIf="showHospitalSelect">
    <label class="form-label">Assign to Hospital <span class="text-danger">*</span></label>
    <select class="form-select">
      <option value="" disabled selected>Select a hospital...</option>
      <option *ngFor="let h of hospitals" [value]="h.id">{{ h.name }}</option>
    </select>
    <div class="form-text text-secondary">Admin can only log in through this hospital's wallet.</div>
  </div>
  <!-- Doctor fields -->
  <ng-container *ngIf="role === 'doctor'">
    <div class="col-md-4"><label class="form-label">First Name <span class="text-danger">*</span></label><input type="text" class="form-control" placeholder="First"></div>
    <div class="col-md-4"><label class="form-label">Middle Name</label><input type="text" class="form-control" placeholder="Optional"></div>
    <div class="col-md-4"><label class="form-label">Last Name <span class="text-danger">*</span></label><input type="text" class="form-control" placeholder="Last"></div>
    <div class="col-12"><label class="form-label">Specialty <span class="text-danger">*</span></label><input type="text" class="form-control" placeholder="e.g. Cardiology"></div>
  </ng-container>
  <!-- Patient fields -->
  <ng-container *ngIf="role === 'patient'">
    <div class="col-md-4"><label class="form-label">First Name <span class="text-danger">*</span></label><input type="text" class="form-control" placeholder="First"></div>
    <div class="col-md-4"><label class="form-label">Middle Name</label><input type="text" class="form-control" placeholder="Optional"></div>
    <div class="col-md-4"><label class="form-label">Last Name <span class="text-danger">*</span></label><input type="text" class="form-control" placeholder="Last"></div>
    <div class="col-md-6"><label class="form-label">Date of Birth <span class="text-danger">*</span></label><input type="date" class="form-control"></div>
    <div class="col-md-6">
      <label class="form-label">Gender <span class="text-danger">*</span></label>
      <select class="form-select">
        <option value="" disabled selected>Select...</option>
        <option value="male">Male</option>
        <option value="female">Female</option>
        <option value="other">Other</option>
        <option value="prefer_not">Prefer not to say</option>
      </select>
    </div>
  </ng-container>
  <!-- Admin / External / SuperAdmin: base fields only, ID + JoinDate auto from SSMS -->
</div>
